<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tactical FaceSnap</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Tactical Face Tracker</h1>
    <p>Live Crowd Scanner (Tap target to extract)</p>
  </header>

  <main>
    <section class="camera-card">
      <div class="video-wrap" id="videoWrap">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>

      <div class="controls">
        <button id="startBtn">Start Scanner</button>
        <button id="flipBtn" disabled>Flip Cam</button>
        <button id="iosBtn" class="ghost">iOS Photo Fallback</button>
      </div>

      <p class="hint" id="statusLine">Status: idle</p>

      <input
        id="iosCapture"
        type="file"
        accept="image/*"
        capture="environment"
        style="display:none"
      />
    </section>

    <section class="gallery-card">
      <div class="gallery-header">
        <h2>Extracted Targets</h2>
        <button id="saveAllBtn" class="accent">Save All</button>
      </div>
      <p class="hint">Saved temporarily in browser. Use Save All to export.</p>
      
      <div class="controls">
        <button id="clearBtn" class="danger">Clear Data</button>
      </div>
      
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <template id="captureTemplate">
    <article class="capture-item">
      <img alt="Target snapshot" />
      <div class="capture-actions">
        <button data-action="save">Export</button>
        <button data-action="delete" class="danger">Trash</button>
      </div>
    </article>
  </template>

  <script type="module" src="app.js"></script>
  <script>
    (async () => {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
      }
    })().catch(console.error);
  </script>
</body>
</html>
