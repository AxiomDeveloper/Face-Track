<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FaceSnap Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>FaceSnap Tracker</h1>
    <p>Live face tracking (Safari) + iOS Camera fallback</p>
  </header>

  <main>
    <section class="camera-card">
      <div class="video-wrap" id="videoWrap">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>

      <div class="controls">
        <button id="startBtn">Start Live Camera</button>
        <button id="flipBtn" disabled>Flip Camera</button>
        <button id="iosBtn" class="ghost">Open iOS Camera (Photo)</button>
      </div>

      <div class="controls">
        <button id="clearBtn" class="danger">Clear Temp Captures</button>
      </div>

      <p class="hint" id="statusLine">Status: idle</p>
      <p class="hint">
        If Live Camera doesn’t work, you’re usually inside an in-app browser (X/IG/TikTok). Open in Safari.
      </p>

      <!-- iOS camera prompt fallback (photo only, not live stream) -->
      <input
        id="iosCapture"
        type="file"
        accept="image/*"
        capture="user"
        style="display:none"
      />
    </section>

    <section class="gallery-card">
      <h2>Temp Captures</h2>
      <p class="hint">
        Saved in this browser (localStorage). Use <strong>Save/Share</strong> on iPhone to add to Photos.
      </p>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <template id="captureTemplate">
    <article class="capture-item">
      <img alt="Captured face snapshot" />
      <div class="capture-actions">
        <button data-action="save">Save / Share</button>
        <button data-action="delete" class="danger">Delete</button>
      </div>
    </article>
  </template>

  <script type="module" src="app.js"></script>
  <script>
    // IMPORTANT: if you keep a service worker, stale caches can break camera debugging.
    // For now, we unregister any old SW to prevent “it still don’t work” due to stale JS.
    (async () => {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
      }
    })().catch(console.error);
  </script>
</body>
</html>
