<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tactical HUD</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  
  <div class="video-wrap" id="videoWrap">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="hud">
    <header class="hud-top">
      <div>
        <h1>TACTICAL SCANNER</h1>
        <p id="statusLine">Status: Offline</p>
      </div>
      <button id="clearBtn" class="icon-btn" title="Clear All Data">🗑️</button>
    </header>

    <div class="hud-bottom">
      
      <div class="actions-bar">
        <button id="startBtn">Engage Scanner</button>
        <button id="flipBtn" disabled>Flip Cam</button>
        <button id="iosBtn" class="ghost" style="display:none">Photo</button>
        <button id="saveAllBtn" class="accent" style="display:none">Save All Extracted</button>
      </div>

      <div id="gallery" class="floating-gallery"></div>
      
    </div>
  </div>

  <input id="iosCapture" type="file" accept="image/*" capture="environment" style="display:none" />

  <template id="captureTemplate">
    <article class="capture-item">
      <img alt="Extracted target" />
      <div class="capture-actions">
        <button data-action="save">📥</button>
        <button data-action="delete" class="danger">✖</button>
      </div>
    </article>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
